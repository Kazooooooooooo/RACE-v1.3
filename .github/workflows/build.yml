name: Build FantasyRaces

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B --no-transfer-progress

      - name: Verify plugin.yml is in JAR
        run: |
          if jar tf target/FantasyRaces-1.0.0.jar | grep -q "plugin.yml"; then
            echo "✅ plugin.yml found in JAR"
          else
            echo "❌ plugin.yml MISSING from JAR - build is broken!"
            jar tf target/FantasyRaces-1.0.0.jar
            exit 1
          fi

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: FantasyRaces
          path: target/FantasyRaces-1.0.0.jar
          if-no-files-found: error
